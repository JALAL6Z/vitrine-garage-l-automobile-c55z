<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage L'Automobile – Atelier de Réparation Premium | Lyon 7</title>
<meta name="description" content="Garage L'Automobile à Lyon 7 – Expert en réparation automobile, entretien, diagnostic et révision. Noté 4.5/5 par 139 clients. Appelez le +33 4 78 58 62 61">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#08111f;
--bg2:#0d1a2d;
--bg3:#111f33;
--gold:#c9963a;
--gold2:#e8b84b;
--gold3:#f5d07a;
--text:#e8e0d4;
--text2:#a09888;
--white:#fff;
--red:#991b1b;
--radius:4px;
--transition:0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;line-height:1.6}
::selection{background:var(--gold);color:#000}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* TIMER BANNER */
#timer-banner{
  position:sticky;top:0;z-index:9999;
  background:var(--red);
  padding:10px 20px;
  display:flex;align-items:center;justify-content:center;gap:12px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  color:#fff;letter-spacing:0.04em;
  box-shadow:0 2px 20px rgba(153,27,27,0.5);
}
#timer-banner span.label{opacity:0.9}
#timer-banner span.countdown{
  background:rgba(0,0,0,0.3);
  border:1px solid rgba(255,255,255,0.2);
  padding:3px 12px;border-radius:3px;
  font-weight:700;letter-spacing:0.08em;font-size:14px;
  font-variant-numeric:tabular-nums;
}
#timer-banner .close-banner{
  margin-left:16px;cursor:pointer;opacity:0.7;
  background:none;border:none;color:#fff;font-size:18px;line-height:1;
  transition:opacity 0.2s;
}
#timer-banner .close-banner:hover{opacity:1}
#timer-banner .fire{font-size:15px}

/* NAV */
#navbar{
  position:sticky;top:0;z-index:9998;
  background:rgba(8,17,31,0.95);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(201,150,58,0.15);
  padding:0 5vw;
  display:flex;align-items:center;justify-content:space-between;
  height:70px;
  transition:var(--transition);
}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#000;
  font-family:'Playfair Display',serif;
}
.nav-logo-text{display:flex;flex-direction:column;line-height:1.1}
.nav-logo-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--white);letter-spacing:0.02em}
.nav-logo-sub{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:0.12em;font-weight:500}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;transition:color 0.25s}
.nav-links a:hover{color:var(--gold)}
.nav-cta{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;font-weight:700;font-size:13px;
  padding:10px 22px;border-radius:var(--radius);
  text-decoration:none;letter-spacing:0.04em;
  transition:var(--transition);box-shadow:0 4px 20px rgba(201,150,58,0.3);
  white-space:nowrap;
}
.nav-cta:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(201,150,58,0.5)}
.nav-cta svg{width:14px;height:14px}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.hamburger span{display:block;width:24px;height:2px;background:var(--gold);border-radius:2px;transition:var(--transition)}
.mobile-menu{display:none;position:fixed;top:0;left:0;width:100%;height:100vh;background:var(--bg2);z-index:9997;flex-direction:column;align-items:center;justify-content:center;gap:32px}
.mobile-menu.open{display:flex}
.mobile-menu a{color:var(--text);text-decoration:none;font-family:'Playfair Display',serif;font-size:24px;font-weight:700;transition:color 0.25s}
.mobile-menu a:hover{color:var(--gold)}
.mobile-menu .mobile-close{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--text2);font-size:28px;cursor:pointer}

/* HERO */
#hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:80px 5vw 60px;
  text-align:center;
}
.hero-bg{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 20%, rgba(201,150,58,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%, rgba(201,150,58,0.04) 0%, transparent 50%),
    linear-gradient(180deg,#08111f 0%,#0a1520 50%,#08111f 100%);
}
.hero-grid-lines{
  position:absolute;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(201,150,58,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,150,58,0.04) 1px,transparent 1px);
  background-size:60px 60px;
}
.hero-content{position:relative;z-index:1;max-width:900px;width:100%}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid rgba(201,150,58,0.3);
  background:rgba(201,150,58,0.05);
  padding:7px 18px;border-radius:100px;
  font-size:12px;font-weight:500;color:var(--gold);
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:28px;
}
.hero-badge span{width:6px;height:6px;background:var(--gold);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.hero-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(36px,7vw,84px);
  font-weight:700;line-height:1.08;
  color:var(--white);margin-bottom:12px;
}
.hero-title em{font-style:italic;color:var(--gold);display:block}
.hero-subtitle{
  font-size:clamp(14px,2vw,18px);color:var(--text2);
  max-width:580px;margin:0 auto 44px;line-height:1.7;font-weight:300;
}
.hero-stats{
  display:flex;justify-content:center;gap:clamp(24px,5vw,64px);
  margin-bottom:44px;flex-wrap:wrap;
}
.hero-stat{text-align:center}
.hero-stat-number{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,4vw,44px);font-weight:700;
  color:var(--gold);line-height:1;display:block;
}
.hero-stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px;display:block}
.hero-stat-divider{width:1px;background:rgba(201,150,58,0.2);align-self:stretch}
.hero-ctas{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-primary{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#000;font-weight:700;font-size:15px;padding:16px 36px;
  border-radius:var(--radius);text-decoration:none;letter-spacing:0.03em;
  transition:var(--transition);box-shadow:0 4px 30px rgba(201,150,58,0.4);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(201,150,58,0.6)}
.btn-secondary{
  display:inline-flex;align-items:center;gap:10px;
  border:1px solid rgba(201,150,58,0.4);
  color:var(--gold);font-weight:600;font-size:15px;padding:16px 36px;
  border-radius:var(--radius);text-decoration:none;letter-spacing:0.03em;
  transition:var(--transition);background:transparent;
}
.btn-secondary:hover{background:rgba(201,150,58,0.08);border-color:var(--gold);transform:translateY(-2px)}
.hero-scroll{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--text2);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
}
.hero-scroll-line{width:1px;height:40px;background:linear-gradient(var(--gold),transparent);animation:scrollLine 1.5s ease-in-out infinite}
@keyframes scrollLine{0%{opacity:1;transform:scaleY(1)}100%{opacity:0;transform:scaleY(0.5) translateY(20px)}}

/* TRUST RIBBON */
#trust{
  background:linear-gradient(135deg,rgba(201,150,58,0.08),rgba(201,150,58,0.03));
  border-top:1px solid rgba(201,150,58,0.12);
  border-bottom:1px solid rgba(201,150,58,0.12);
  padding:24px 5vw;
}
.trust-inner{
  display:flex;justify-content:center;align-items:center;
  gap:clamp(16px,3vw,40px);flex-wrap:wrap;
}
.trust-item{
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:500;color:var(--text);
  white-space:nowrap;
}
.trust-check{
  width:22px;height:22px;min-width:22px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.trust-check svg{width:12px;height:12px;color:#000}
.trust-sep{width:1px;height:28px;background:rgba(201,150,58,0.15)}

/* MARQUEE */
#marquee{padding:20px 0;overflow:hidden;background:var(--bg);border-bottom:1px solid rgba(201,150,58,0.08)}
.marquee-track{display:flex;gap:0;animation:marqueeAnim 30s linear infinite;width:max-content}
.marquee-track:hover{animation-play-state:paused}
.marquee-item{
  display:flex;align-items:center;gap:10px;
  padding:0 28px;white-space:nowrap;
  font-size:13px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:0.1em;
}
.marquee-item span.dot{width:4px;height:4px;background:var(--gold);border-radius:50%;flex-shrink:0}
.marquee-item.highlight{color:var(--gold)}
@keyframes marqueeAnim{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* SECTIONS COMMUNES */
section{padding:100px 5vw}
.section-tag{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--gold);font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.15em;margin-bottom:16px;
}
.section-tag::before{content:'';display:block;width:24px;height:1px;background:var(--gold)}
.section-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,4vw,48px);font-weight:700;
  color:var(--white);line-height:1.15;margin-bottom:20px;
}
.section-title em{font-style:italic;color:var(--gold)}
.section-desc{color:var(--text2);font-size:16px;line-height:1.8;max-width:560px;font-weight:300}
.section-header{margin-bottom:64px}

/* SERVICES GRID */
#services{background:var(--bg2)}
.services-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:2px;
}
.service-card{
  background:var(--bg3);
  padding:clamp(28px,4vw,52px);
  position:relative;overflow:hidden;
  transition:var(--transition);cursor:default;
  border:1px solid rgba(201,150,58,0.05);
}
.service-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,150,58,0.05) 0%,transparent 60%);
  opacity:0;transition:var(--transition);
}
.service-card:hover{transform:translateY(-4px);border-color:rgba(201,150,58,0.2)}
.service-card:hover::before{opacity:1}
.service-number{
  font-family:'Playfair Display',serif;
  font-size:clamp(48px,6vw,80px);font-weight:900;
  color:rgba(201,150,58,0.08);
  line-height:1;margin-bottom:24px;display:block;
  transition:var(--transition);
}
.service-card:hover .service-number{color:rgba(201,150,58,0.15)}
.service-icon{
  width:52px;height:52px;
  background:linear-gradient(135deg,rgba(201,150,58,0.12),rgba(201,150,58,0.04));
  border:1px solid rgba(201,150,58,0.2);
  border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;font-size:22px;
  transition:var(--transition);
}
.service-card:hover .service-icon{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent}
.service-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(18px,2vw,24px);font-weight:700;
  color:var(--white);margin-bottom:12px;
}
.service-desc{color:var(--text2);font-size:14px;line-height:1.75;font-weight:300}
.service-link{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--gold);font-size:13px;font-weight:600;
  margin-top:20px;text-decoration:none;letter-spacing:0.05em;
  transition:gap 0.25s;
}
.service-link:hover{gap:10px}
.service-link svg{width:14px;height:14px;transition:transform 0.25s}
.service-link:hover svg{transform:translateX(3px)}

/* TESTIMONIALS */
#testimonials{background:var(--bg)}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.testi-card{
  background:var(--bg3);
  border:1px solid rgba(201,150,58,0.08);
  border-radius:var(--radius);
  padding:clamp(24px,3vw,40px);
  position:relative;overflow:hidden;
  transition:var(--transition);
}
.testi-card::after{
  content:'"';
  position:absolute;top:-10px;right:20px;
  font-family:'Playfair Display',serif;
  font-size:120px;font-weight:900;
  color:rgba(201,150,58,0.04);line-height:1;
}
.testi-card:hover{border-color:rgba(201,150,58,0.2);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.testi-stars{display:flex;gap:4px;margin-bottom:16px}
.testi-star{color:var(--gold);font-size:14px}
.testi-text{color:var(--text);font-size:14px;line-height:1.8;font-style:italic;margin-bottom:24px;font-weight:300}
.testi-author{display:flex;align-items:center;gap:12px}
.testi-avatar{
  width:44px;height:44px;min-width:44px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:700;font-size:16px;color:#000;
}
.testi-info{display:flex;flex-direction:column}
.testi-name{font-weight:700;color:var(--white);font-size:14px}
.testi-meta{color:var(--text2);font-size:12px;margin-top:2px}

/* GOOGLE RATING */
.google-rating-box{
  display:flex;align-items:center;justify-content:center;gap:20px;
  background:rgba(201,150,58,0.05);border:1px solid rgba(201,150,58,0.15);
  border-radius:var(--radius);padding:24px 40px;
  margin-bottom:56px;width:fit-content;margin-left:auto;margin-right:auto;
}
.gr-score{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:var(--gold);line-height:1}
.gr-right{display:flex;flex-direction:column;gap:6px}
.gr-stars{display:flex;gap:4px}
.gr-stars span{color:var(--gold);font-size:18px}
.gr-count{color:var(--text2);font-size:13px}
.gr-logo{color:var(--text2);font-size:12px;font-weight:600;letter-spacing:0.05em;margin-top:4px}
.gr-divider{width:1px;height:50px;background:rgba(201,150,58,0.15)}

/* CTA SECTION */
#cta-section{
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);
  border-top:1px solid rgba(201,150,58,0.12);
  border-bottom:1px solid rgba(201,150,58,0.12);
  text-align:center;
}
.cta-inner{max-width:800px;margin:0 auto}
.price-box{
  display:inline-flex;flex-direction:column;align-items:center;
  border:1px solid rgba(201,150,58,0.3);
  background:linear-gradient(135deg,rgba(201,150,58,0.06),rgba(201,150,58,0.02));
  border-radius:var(--radius);
  padding:clamp(32px,4vw,56px) clamp(24px,5vw,80px);
  margin:48px 0;width:100%;max-width:600px;
  position:relative;overflow:hidden;
}
.price-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.price-box-badge{
  background:var(--gold);color:#000;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.1em;padding:5px 16px;
  border-radius:100px;margin-bottom:24px;
}
.price-box-title{
  font-family:'Playfair Display',serif;font-size:clamp(20px,2.5vw,28px);
  font-weight:700;color:var(--white);margin-bottom:8px;
}
.price-box-desc{color:var(--text2);font-size:14px;margin-bottom:28px;line-height:1.7}
.price-box-features{
  display:flex;flex-direction:column;gap:10px;
  margin-bottom:32px;text-align:left;width:100%;
}
.price-box-feature{
  display:flex;align-items:center;gap:10px;
  color:var(--text);font-size:14px;font-weight:500;
}
.price-box-feature .chk{
  width:20px;height:20px;min-width:20px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.price-box-feature .chk svg{width:10px;height:10px;color:#000}
.cta-phones{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:32px}
.cta-phone-link{
  display:flex;align-items:center;gap:10px;
  color:var(--gold);font-family:'Playfair Display',serif;
  font-size:clamp(20px,2.5vw,28px);font-weight:700;
  text-decoration:none;transition:color 0.25s;
}
.cta-phone-link:hover{color:var(--gold3)}
.cta-address{color:var(--text2);font-size:14px;margin-top:16px;line-height:1.6}

/* FOOTER */
footer{
  background:var(--bg);
  border-top:1px solid rgba(201,150,58,0.08);
  padding:40px 5vw 24px;
}
.footer-inner{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:24px;margin-bottom:32px;
}
.footer-logo-area{}
.footer-logo-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--white)}
.footer-logo-sub{font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:0.12em}
.footer-info{display:flex;flex-direction:column;gap:6px;text-align:right}
.footer-info a,.footer-info p{color:var(--text2);font-size:14px;text-decoration:none;transition:color 0.25s}
.footer-info a:hover{color:var(--gold)}
.footer-divider{height:1px;background:rgba(201,150,58,0.08);margin-bottom:20px}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-copy{color:var(--text2);font-size:12px}
.footer-links{display:flex;gap:20px}
.footer-links a{color:var(--text2);font-size:12px;text-decoration:none;transition:color 0.25s}
.footer-links a:hover{color:var(--gold)}

/* REVEAL ANIMATIONS */
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal.revealed{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-30px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal-left.revealed{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(30px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal-right.revealed{opacity:1;transform:translateX(0)}
.reveal-delay-1{transition-delay:0.1s}
.reveal-delay-2{transition-delay:0.2s}
.reveal-delay-3{transition-delay:0.3s}
.reveal-delay-4{transition-delay:0.4s}

/* DIVIDER */
.gold-divider{
  display:flex;align-items:center;gap:16px;margin:20px 0;
}
.gold-divider-line{flex:1;height:1px;background:rgba(201,150,58,0.15)}
.gold-divider-icon{color:var(--gold);font-size:14px}

/* ABOUT STRIP */
#about{background:var(--bg)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.about-visual{
  position:relative;
  aspect-ratio:4/3;
  background:var(--bg3);
  border:1px solid rgba(201,150,58,0.1);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.about-visual-inner{text-align:center;padding:40px}
.about-icon-big{font-size:80px;display:block;margin-bottom:16px}
.about-visual-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--white);font-weight:700}
.about-visual-sub{color:var(--text2);font-size:14px;margin-top:8px}
.about-visual::before{
